const { useState, useEffect, useCallback } = React;
const today = new Date();

function load(key, fallback) { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : fallback; } catch { return fallback; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
function useLS(key, fallback) {
  const [val, setVal] = useState(() => load(key, fallback));
  useEffect(() => save(key, val), [key, val]);
  return [val, setVal];
}
function daysUntil(d) { return Math.round((new Date(d) - today) / 86400000); }
function fmt(d) { return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"}); }

// ─── SPIN WHEEL ───────────────────────────────────────────────────────────────
function SpinWheel() {
  const [spinning, setSpinning] = useState(false);
  const [rotation, setRotation] = useState(0);
  const [result, setResult] = useState(null);

  const spin = () => {
    if (spinning) return;
    setSpinning(true); setResult(null);
    const idx = Math.floor(Math.random() * SPIN_OPTIONS.length);
    const extra = 5 + Math.floor(Math.random() * 5);
    const seg = 360 / SPIN_OPTIONS.length;
    const target = extra * 360 + (360 - idx * seg - seg / 2);
    setRotation(r => {
      const nr = r + target;
      setTimeout(() => { setSpinning(false); setResult(SPIN_OPTIONS[idx]); }, 3500);
      return nr;
    });
  };

  const n = SPIN_OPTIONS.length, sa = 360 / n;
  const path = i => { const s=(i*sa-90)*Math.PI/180, e=((i+1)*sa-90)*Math.PI/180, r=110; return `M120,120 L${120+r*Math.cos(s)},${120+r*Math.sin(s)} A${r},${r} 0 0,1 ${120+r*Math.cos(e)},${120+r*Math.sin(e)} Z`; };
  const tp = i => { const a=((i+.5)*sa-90)*Math.PI/180; return {x:120+75*Math.cos(a),y:120+75*Math.sin(a)}; };

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:16 }}>
      <div style={{ position:"relative" }}>
        <div style={{ position:"absolute", top:-14, left:"50%", transform:"translateX(-50%)", width:0, height:0, borderLeft:"10px solid transparent", borderRight:"10px solid transparent", borderTop:"22px solid #FF6B6B", zIndex:10 }}/>
        <svg width="240" height="240" style={{ transition:spinning?"transform 3.5s cubic-bezier(0.17,0.67,0.12,0.99)":"none", transform:`rotate(${rotation}deg)`, filter:"drop-shadow(0 4px 20px rgba(0,0,0,0.3))" }}>
          {SPIN_OPTIONS.map((o,i) => <g key={i}><path d={path(i)} fill={o.color} stroke="#1a1a2e" strokeWidth="2"/><text x={tp(i).x} y={tp(i).y} textAnchor="middle" dominantBaseline="middle" fontSize="18" style={{userSelect:"none"}}>{o.emoji}</text></g>)}
          <circle cx="120" cy="120" r="18" fill="#1a1a2e" stroke="#fff" strokeWidth="3"/>
          <text x="120" y="120" textAnchor="middle" dominantBaseline="middle" fontSize="14" fill="#fff">★</text>
        </svg>
      </div>
      <button onClick={spin} disabled={spinning} style={{ background:spinning?"rgba(255,255,255,0.1)":"linear-gradient(135deg,#FF6B6B,#ee5a24)", color:"#fff", border:"none", borderRadius:30, padding:"10px 28px", fontSize:15, fontWeight:700, cursor:spinning?"not-allowed":"pointer", fontFamily:"inherit", letterSpacing:1, boxShadow:spinning?"none":"0 4px 15px rgba(255,107,107,0.4)" }}>
        {spinning ? "SPINNING..." : "🎰 SPIN"}
      </button>
      {result && <div style={{ background:result.color+"22", border:`2px solid ${result.color}`, borderRadius:12, padding:"10px 20px", textAlign:"center", animation:"fadeIn 0.5s ease" }}><div style={{ fontSize:28 }}>{result.emoji}</div><div style={{ fontWeight:700, color:"#fff", fontSize:16 }}>{result.label}</div></div>}
    </div>
  );
}

function BlockerCard({ blocker, onResolve }) {
  const days = Math.floor((Date.now() - new Date(blocker.createdAt)) / 86400000);
  const urg = days >= 5 ? "#FF6B6B" : days >= 2 ? "#FFE66D" : "#4ECDC4";
  return (
    <div style={{ background:"rgba(255,255,255,0.04)", border:`1px solid ${urg}44`, borderLeft:`4px solid ${urg}`, borderRadius:10, padding:"12px 14px", marginBottom:8 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:14, color:"#eee", marginBottom:4 }}>{blocker.text}</div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,0.5)" }}>🙋 {blocker.owner.split(" ")[0]} · {blocker.project}</div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:6, marginLeft:12 }}>
          <div style={{ background:urg+"33", color:urg, borderRadius:20, padding:"2px 10px", fontSize:12, fontWeight:800, whiteSpace:"nowrap" }}>{days===0?"NEW":`${days}d stuck`}</div>
          <button onClick={() => onResolve(blocker.id)} style={{ background:"rgba(78,205,196,0.2)", border:"1px solid #4ECDC4", color:"#4ECDC4", borderRadius:6, padding:"3px 10px", cursor:"pointer", fontSize:12, fontWeight:600, fontFamily:"inherit" }}>✓ Done</button>
        </div>
      </div>
    </div>
  );
}

  const syncMonday = async token => {
    if (!token) { setShowMondayModal(true); return; }
    setMondayLoading(true); setMondayError(null);
    try {
      const q = `{ boards(limit:50) { name items_page(limit:100) { items { id name column_values { id text type } } } } }`;
      const res = await fetch("https://api.monday.com/v2", { method:"POST", headers:{"Content-Type":"application/json","Authorization":token}, body:JSON.stringify({query:q}) });
      const data = await res.json();
      if (data.errors) throw new Error(data.errors[0]?.message);
      const items = [];
      (data?.data?.boards||[]).forEach(board=>{
        (board?.items_page?.items||[]).forEach(item=>{
          const dc = item.column_values?.find(c=>c.type==="date"||c.id.includes("date")||c.id.includes("due"));

      });
      if (items.length > 0) { setMondayItems(items); setMondayConnected(true); }

    setMondayLoading(false);

        </div>

              <div key={g.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:"1px solid rgba(255,255,255,0.05)", opacity:g.done?0.5:1 }}>
                <div onClick={()=>setGoals(prev=>prev.map(x=>{ if(x.id!==g.id) return x; if(!x.done) award(x.owner,POINT_VALUES.completeGoal); return {...x,done:!x.done}; }))} style={{ width:18, height:18, borderRadius:5, border:g.done?"none":"2px solid rgba(255,255,255,0.25)", background:g.done?"#4ECDC4":"transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontSize:11, fontWeight:800, cursor:"pointer" }}>{g.done?"✓":""}</div>
                <div onClick={()=>setGoals(prev=>prev.map(x=>{ if(x.id!==g.id) return x; if(!x.done) award(x.owner,POINT_VALUES.completeGoal); return {...x,done:!x.done}; }))} style={{ flex:1, cursor:"pointer" }}><div style={{ fontSize:13, textDecoration:g.done?"line-through":"none" }}>{g.text}</div><div style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>→ {g.owner.split(" ")[0]}</div></div>
                <button onClick={()=>setGoals(prev=>prev.filter(x=>x.id!==g.id))} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:14, flexShrink:0 }}>×</button>
              </div>
            ))}
            {sag
              ? <AddForm onSave={()=>{ if(!ngt.trim()) return; setGoals(p=>[...p,{id:Date.now(),text:ngt,done:false,owner:ngo}]); setNgt(""); setSag(false); }} onCancel={()=>setSag(false)}>
                  <input style={{...C.input,marginBottom:8}} placeholder="Goal description..." value={ngt} onChange={e=>setNgt(e.target.value)}/>
                  <select style={C.select} value={ngo} onChange={e=>setNgo(e.target.value)}>{TEAM_MEMBERS.map(m=><option key={m}>{m}</option>)}</select>
                </AddForm>
              : <button style={C.addBtn} onClick={()=>setSag(true)}>+ Add Goal</button>}
          </div>

          {/* ANNOUNCEMENTS */}
          <div style={C.card}>
            <div style={C.cardTitle}><span>📣 Updates & Announcements</span></div>
            {announcements.map(a=>(
              <div key={a.id} style={{ display:"flex", gap:10, padding:"8px 0", borderBottom:"1px solid rgba(255,255,255,0.05)", alignItems:"flex-start" }}>
                {a.pinned&&<span style={{ fontSize:12, color:"#FFE66D", flexShrink:0, marginTop:1 }}>📌</span>}
                <div style={{ fontSize:13, color:a.pinned?"#fff":"rgba(255,255,255,0.75)", flex:1 }}>{a.text}</div>
                <button onClick={()=>setAnn(p=>p.filter(x=>x.id!==a.id))} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:14 }}>×</button>
              </div>
            ))}
            {saa
              ? <AddForm onSave={()=>{ if(!na.trim()) return; setAnn(p=>[...p,{id:Date.now(),text:na,pinned:false}]); setNa(""); setSaa(false); }} onCancel={()=>setSaa(false)}>
                  <input style={C.input} placeholder="Announcement text..." value={na} onChange={e=>setNa(e.target.value)}/>
                </AddForm>
              : <button style={C.addBtn} onClick={()=>setSaa(true)}>+ Add Announcement</button>}
          </div>

          {/* BLOCKERS */}
          <div style={{...C.card, gridRow:"1 / 3"}}>
            <div style={C.cardTitle}><span>🚧 Blockers</span><span style={C.pill("#FF6B6B")}>{blockers.length} active</span></div>
            <div style={{ fontSize:11, color:"rgba(255,255,255,0.3)", marginBottom:12 }}>🟢 new · 🟡 2+ days · 🔴 5+ days</div>
            {blockers.length===0&&<div style={{ textAlign:"center", padding:32, color:"rgba(255,255,255,0.2)", fontSize:13 }}>🎉 No blockers!</div>}
            {blockers.map(b=><BlockerCard key={b.id} blocker={b} onResolve={id=>{ const b=blockers.find(x=>x.id===id); if(b) award(b.owner,POINT_VALUES.resolveBlocker); setBlockers(p=>p.filter(x=>x.id!==id)); }}/>)}
            {sab
              ? <AddForm onSave={()=>{ if(!nbt.trim()) return; setBlockers(p=>[...p,{id:Date.now(),text:nbt,owner:nbo,project:nbp,createdAt:new Date().toISOString()}]); setNbt(""); setNbp(""); setSab(false); }} onCancel={()=>setSab(false)}>
                  <input style={{...C.input,marginBottom:8}} placeholder="Describe the blocker..." value={nbt} onChange={e=>setNbt(e.target.value)}/>
                  <select style={{...C.select,marginBottom:8}} value={nbo} onChange={e=>setNbo(e.target.value)}>{TEAM_MEMBERS.map(m=><option key={m}>{m}</option>)}</select>
                  <input style={C.input} placeholder="Project name..." value={nbp} onChange={e=>setNbp(e.target.value)}/>
                </AddForm>
              : <button style={C.addBtn} onClick={()=>setSab(true)}>+ Add Blocker</button>}
          </div>

          {/* PTO */}
          <div style={C.card}>
            <div style={C.cardTitle}><span>🏖️ Upcoming PTO</span></div>
            {uPto.length===0&&<div style={{ fontSize:13, color:"rgba(255,255,255,0.3)" }}>No upcoming PTO scheduled.</div>}
            {uPto.map(p=>{ const d=daysUntil(p.start); return (
              <div key={p.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
                <div style={{ width:34, height:34, borderRadius:10, background:"linear-gradient(135deg,#3f5efb22,#fc466b22)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>{p.person.charAt(0)}</div>
                <div style={{ flex:1 }}><div style={{ fontSize:13, fontWeight:600 }}>{p.person.split(" ")[0]}</div><div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>{fmt(p.start)}{p.start!==p.end?` – ${fmt(p.end)}`:""} · {p.note}</div></div>
                <div style={{ fontSize:11, color:d<=2?"#FF6B6B":d<=5?"#FFE66D":"#4ECDC4", fontWeight:700 }}>{d===0?"TODAY":d<0?"NOW":`in ${d}d`}</div>
                <button onClick={()=>setPto(prev=>prev.filter(x=>x.id!==p.id))} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.2)", cursor:"pointer", fontSize:14 }}>×</button>
              </div>
            ); })}
            {sap
              ? <AddForm onSave={()=>{ setPto(p=>[...p,{id:Date.now(),person:npp,start:nps,end:npe,note:npn}]); setNpn(""); setSap(false); }} onCancel={()=>setSap(false)}>
                  <select style={{...C.select,marginBottom:8}} value={npp} onChange={e=>setNpp(e.target.value)}>{TEAM_MEMBERS.map(m=><option key={m}>{m}</option>)}</select>
                  <div style={{ display:"flex", gap:8, marginBottom:8 }}><input type="date" style={C.input} value={nps} onChange={e=>setNps(e.target.value)}/><input type="date" style={C.input} value={npe} onChange={e=>setNpe(e.target.value)}/></div>
                  <input style={C.input} placeholder="Note (optional)..." value={npn} onChange={e=>setNpn(e.target.value)}/>
                </AddForm>
              : <button style={C.addBtn} onClick={()=>setSap(true)}>+ Add PTO</button>}
          </div>

          {/* MONDAY DUE DATES */}
          <div style={C.card}>
            <div style={C.cardTitle}><span>📅 Due Soon — monday.com</span><button onClick={()=>syncMonday(mondayToken)} style={{ background:"none", border:"none", color:"rgba(255,255,255,0.3)", cursor:"pointer", fontSize:16 }}>{mondayLoading?"⏳":"↻"}</button></div>
            {!mondayConnected&&<div style={{ background:"rgba(63,94,251,0.08)", border:"1px solid rgba(63,94,251,0.25)", borderRadius:8, padding:10, marginBottom:12, fontSize:12, color:"rgba(255,255,255,0.45)" }}>⚡ Sample data. <span style={{ color:"#4ECDC4", cursor:"pointer" }} onClick={()=>setShowMondayModal(true)}>Connect monday.com</span> for live data.</div>}
            {dueSoon.length===0&&<div style={{ textAlign:"center", padding:24, color:"rgba(255,255,255,0.25)", fontSize:13 }}>Nothing due soon 🎉</div>}
            {dueSoon.map(item=>{ const d=daysUntil(item.dueDate); const col=d<0?"#FF6B6B":d===0?"#FF6B6B":d<=2?"#FFE66D":"#4ECDC4"; return (
              <div key={item.id} style={{ display:"flex", gap:10, padding:"8px 0", borderBottom:"1px solid rgba(255,255,255,0.05)", alignItems:"center" }}>
                <div style={{ width:4, borderRadius:4, alignSelf:"stretch", background:col, flexShrink:0, minHeight:30 }}/>
                <div style={{ flex:1, minWidth:0 }}><div style={{ fontSize:13, fontWeight:500, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.name}</div><div style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>{item.board} · {item.assignee}</div></div>
                <div style={{ textAlign:"right", flexShrink:0 }}><div style={{ fontSize:12, color:col, fontWeight:700 }}>{d<0?`${Math.abs(d)}d over`:d===0?"TODAY":`${d}d`}</div><div style={{ fontSize:10, color:"rgba(255,255,255,0.3)" }}>{fmt(item.dueDate)}</div></div>
              </div>
            ); })}
          </div>
        </div>
      )}

      {/* ATTENDANCE */}
      {tab==="attendance" && (
        <div style={{ padding:32 }}>
          <div style={{ fontSize:22, fontWeight:800, marginBottom:6 }}>Today's Attendance</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:28 }}>Tap your name to check in. +{POINT_VALUES.checkIn} pts per standup!</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))", gap:14 }}>
            {TEAM_MEMBERS.map(name=>{ const first=name.split(" ")[0], last=name.split(" ")[1], checked=todayAtt.includes(name); return (
              <div key={name} onClick={()=>setAttendees(prev=>{ const n={...prev}; if(!n[todayStr]) n[todayStr]=[]; if(!n[todayStr].includes(name)){ n[todayStr]=[...n[todayStr],name]; award(name,POINT_VALUES.checkIn); setStreaks(s=>({...s,[name]:(s[name]||0)+1})); } else { n[todayStr]=n[todayStr].filter(x=>x!==name); } return n; })} style={{ background:checked?"rgba(78,205,196,0.1)":"rgba(255,255,255,0.04)", border:`2px solid ${checked?"#4ECDC4":"rgba(255,255,255,0.08)"}`, borderRadius:14, padding:20, cursor:"pointer", textAlign:"center", transition:"all 0.2s", position:"relative" }}>
                {checked&&<div style={{ position:"absolute", top:10, right:10, background:"#4ECDC4", color:"#000", borderRadius:"50%", width:22, height:22, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:800 }}>✓</div>}
                <div style={{ width:52, height:52, borderRadius:"50%", background:checked?"linear-gradient(135deg,#4ECDC4,#44a08d)":"linear-gradient(135deg,#3f5efb44,#fc466b44)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, fontWeight:800, margin:"0 auto 10px", color:"#fff", boxShadow:checked?"0 0 20px rgba(78,205,196,0.4)":"none" }}>{first.charAt(0)}</div>
                <div style={{ fontWeight:700, fontSize:15, marginBottom:2 }}>{first}</div>
                <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginBottom:10 }}>{last}</div>
                <div style={{ display:"flex", justifyContent:"center", gap:16 }}>
                  <div><div style={{ fontSize:16, fontWeight:800, color:"#FFE66D" }}>{points[name]||0}</div><div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>pts</div></div>
                  <div><div style={{ fontSize:16, fontWeight:800, color:"#FF6B6B" }}>🔥{streaks[name]||0}</div><div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>streak</div></div>
                </div>
              </div>
            ); })}
          </div>
          <div style={{ marginTop:24, fontSize:13, color:"rgba(255,255,255,0.4)" }}>{todayAtt.length} / {TEAM_MEMBERS.length} checked in today</div>
        </div>
      )}

      {/* LEARN */}

      {/* MORALE */}
      {tab==="morale" && (
        <div style={{ padding:32, display:"flex", gap:40, flexWrap:"wrap", alignItems:"flex-start" }}>
          <div style={{ flex:"0 0 300px" }}>
            <div style={{ fontSize:22, fontWeight:800, marginBottom:6 }}>Fun Activity Wheel</div>
            <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:28 }}>Spin at the end of standup for a quick morale boost!</div>
            <SpinWheel/>
          </div>
          <div style={{ flex:1, minWidth:280 }}>
            <div style={{ fontSize:14, fontWeight:700, marginBottom:16, color:"rgba(255,255,255,0.6)" }}>ACTIVITY OPTIONS</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              {SPIN_OPTIONS.map((o,i)=><div key={i} style={{ background:o.color+"11", border:`1px solid ${o.color}44`, borderRadius:12, padding:"12px 16px", display:"flex", gap:10, alignItems:"center" }}><span style={{ fontSize:22 }}>{o.emoji}</span><span style={{ fontSize:13, fontWeight:600 }}>{o.label}</span></div>)}
            </div>
            <div style={{ marginTop:24 }}>
              <div style={{ fontSize:14, fontWeight:700, marginBottom:12, color:"rgba(255,255,255,0.6)" }}>TEAM BADGES</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {BADGES.map((b,i)=><div key={i} style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:10, padding:"8px 14px", display:"flex", alignItems:"center", gap:8 }}><span style={{ fontSize:18 }}>{b.emoji}</span><div><div style={{ fontSize:12, fontWeight:700 }}>{b.label}</div><div style={{ fontSize:10, color:"rgba(255,255,255,0.35)" }}>{b.desc}</div></div></div>)}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* LEADERBOARD */}
      {tab==="leaderboard" && (
        <div style={{ padding:32, maxWidth:700 }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6 }}><div style={{ fontSize:22, fontWeight:800 }}>🏆 Team Leaderboard</div><button onClick={()=>{ if(window.confirm("Reset all points, streaks and attendance to zero?")){ const zero=Object.fromEntries(TEAM_MEMBERS.map(m=>[m,0])); setPoints(zero); setStreaks(zero); setAttendees({}); }}} style={{ background:"rgba(255,107,107,0.12)", border:"1px solid rgba(255,107,107,0.3)", color:"#FF6B6B", borderRadius:8, padding:"7px 16px", cursor:"pointer", fontSize:12, fontFamily:"inherit", fontWeight:600 }}>🔄 Reset All Scores</button></div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.4)", marginBottom:28 }}>check in (+{POINT_VALUES.checkIn}) · goal (+{POINT_VALUES.completeGoal}) · blocker (+{POINT_VALUES.resolveBlocker}) · quiz (+{POINT_VALUES.quizCorrect}) · spin (+{POINT_VALUES.spinWheel})</div>
          {lb.map(([name,pts],i)=>{ const pct=(pts/(lb[0][1]||1))*100; return (
            <div key={name} style={{ background:i===0?"rgba(255,230,109,0.06)":"rgba(255,255,255,0.03)", border:`1px solid ${i===0?"rgba(255,230,109,0.2)":"rgba(255,255,255,0.07)"}`, borderRadius:12, padding:"14px 18px", marginBottom:8, display:"flex", alignItems:"center", gap:14 }}>
              <div style={{ fontSize:24, width:36, textAlign:"center" }}>{rankEmoji(i)}</div>
              <div style={{ width:40, height:40, borderRadius:"50%", background:"linear-gradient(135deg,#3f5efb,#fc466b)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:16, flexShrink:0 }}>{name.charAt(0)}</div>
              <div style={{ flex:1 }}>
                <div style={{ fontWeight:700, fontSize:15, marginBottom:4 }}>{name}</div>
                <div style={{ height:6, borderRadius:3, background:"rgba(255,255,255,0.08)", overflow:"hidden" }}><div style={{ height:"100%", width:`${pct}%`, background:i===0?"linear-gradient(90deg,#FFE66D,#f9ca24)":"linear-gradient(90deg,#3f5efb,#fc466b)", borderRadius:3, transition:"width 0.8s ease" }}/></div>
              </div>
              <div style={{ textAlign:"right" }}><div style={{ fontSize:20, fontWeight:900, color:i===0?"#FFE66D":"#fff" }}>{pts}</div><div style={{ fontSize:11, color:"rgba(255,255,255,0.35)" }}>pts</div></div>
              <div style={{ textAlign:"center", minWidth:50 }}><div style={{ fontSize:16 }}>🔥</div><div style={{ fontSize:12, fontWeight:700, color:"#FF6B6B" }}>{streaks[name]||0}</div></div>
            </div>
          ); })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
